services:
  veslo-host:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Keep this in sync with packages/orchestrator/package.json if you want a pinned release.
        VESLO_ORCHESTRATOR_VERSION: 0.11.22
    ports:
      - "8787:8787"
    environment:
      # Set these explicitly for stable sharing.
      # VESLO_TOKEN: "..."
      # VESLO_HOST_TOKEN: "..."
      # Optional: VESLO_APPROVAL_MODE: "auto"
      # Optional: VESLO_APPROVAL_TIMEOUT_MS: "30000"
      VESLO_DATA_DIR: /data/veslo-orchestrator
      VESLO_SIDECAR_DIR: /data/sidecars
    volumes:
      # Mount an existing project/workspace here.
      - ./workspace:/workspace
      # Persistent host data (OpenCode caches, Veslo server config, tokens).
      - ./data:/data
